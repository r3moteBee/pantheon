  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

networks:
  agent-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1420"

