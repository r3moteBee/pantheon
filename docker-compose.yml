version: '3.9'

services:
  backend:
    build:
      context: ./backend
      args:
        - INSTALL_OFFICE=${INSTALL_OFFICE:-false}
        - INSTALL_BROWSER=${INSTALL_BROWSER:-false}
    container_name: pantheon-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8001
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb
      - searxng
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 100.100.100.100
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - agent-net

  frontend:
    build: ./frontend
    container_name: pantheon-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agent-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: pantheon-chroma
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - agent-net

  nginx:
    image: nginx:alpine
    container_name: pantheon-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - agent-net

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: pantheon-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./data/searxng:/etc/searxng:rw
    environment:
      - BASE_URL=http://localhost:8888/
      - INSTANCE_NAME=pantheon-searxng
    restart: unless-stopped
    networks:
      - agent-net

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: pantheon-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
