  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

networks:
  agent-net:
    driver: bridge

secrets:
  vault_master_key:
    file: ./secrets/vault_master_key.txt

volumes:
